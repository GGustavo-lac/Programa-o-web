<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infos do Dia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Infos do Dia</a>
    </div>
</nav>

<header class="bg-light text-center p-5">
    <h1 class="display-5">Resumo Diário</h1>
    <p class="lead">Atualizações rápidas e simples</p>
    <button class="btn btn-primary" onclick="atualizarMensagem()">Atualizar Mensagem</button>
</header>

<div class="container mt-4">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Clima</h5>
                    <p class="card-text">Temperatura média: 28°C</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Frase do Dia</h5>
                    <p class="card-text" id="frase">"Persistência gera resultados."</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Dica</h5>
                    <p class="card-text">Organize seu tempo e aumente sua produtividade.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 Infos do Dia
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
